# Pool Water Console — Netlify configuration
# Static single-page site; no build step required.

[build]
  publish = "."
  command = ""

# ---- Security headers (apply to every route) ----
[[headers]]
  for = "/*"
  [headers.values]
    # Content Security Policy. Inline <script>/<style> are used by this
    # single-file app, so 'unsafe-inline' is required; everything else is
    # locked down to self and the few services the app actually calls.
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; manifest-src 'self' data:; connect-src 'self' https://api.zippopotam.us https://geocoding-api.open-meteo.com https://api.open-meteo.com; upgrade-insecure-requests"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(self), browsing-topics=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

# ---- Caching ----
# Always revalidate the HTML so testers get the latest version.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Share image / static assets can be cached for a while.
[[headers]]
  for = "/og-image.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"
